<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parrticles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      z-index: 10;
    }
    #overlay h1 { font-size: 2.5rem; letter-spacing: 0.1em; }
    #overlay p { color: #aaa; font-size: 1rem; }
    #startBtn {
      margin-top: 8px;
      padding: 14px 36px;
      font-size: 1.1rem;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      border-radius: 40px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #startBtn:hover { background: #fff; color: #000; }
    #ui {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 5;
    }
    .ctrl { display: flex; flex-direction: column; gap: 4px; }
    label { color: #888; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    input[type=range] { width: 120px; accent-color: #fff; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="overlay">
  <h1>parrticles</h1>
  <p>Sound-reactive particle visualizer</p>
  <button id="startBtn">Allow Microphone</button>
</div>

<div id="ui" style="display:none">
  <div class="ctrl">
    <label>Sensitivity</label>
    <input type="range" id="sensitivity" min="1" max="10" value="5" step="0.1" />
  </div>
  <div class="ctrl">
    <label>Hue</label>
    <input type="range" id="hue" min="0" max="360" value="0" step="1" />
  </div>
  <div class="ctrl">
    <label>Particles</label>
    <input type="range" id="maxParticles" min="100" max="2000" value="400" step="50" />
  </div>
  <div class="ctrl">
    <label>Lifespan</label>
    <input type="range" id="lifespan" min="30" max="300" value="120" step="10" />
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let analyser, dataArray, bufferLength;

document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const audioCtx = new AudioContext();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 128; // 64 frequency bins
    bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
    source.connect(analyser);

    document.getElementById('overlay').style.display = 'none';
    document.getElementById('ui').style.display = 'flex';
    requestAnimationFrame(loop);
  } catch (e) {
    alert('Microphone access denied or unavailable.');
  }
});

const sensitivityEl  = document.getElementById('sensitivity');
const hueEl          = document.getElementById('hue');
const maxParticlesEl = document.getElementById('maxParticles');
const lifespanEl     = document.getElementById('lifespan');

// --- Rings ---
const rings = [];

class Ring {
  constructor(binIndex, amp) {
    this.cx = W / 2;
    this.cy = H / 2;
    this.radius = 3;
    this.amp = amp;
    this.life = 1;
    this.decay = (1 / parseInt(lifespanEl.value)) * (1.5 + (1 - amp));
    this.hue = (parseInt(hueEl.value) + binIndex * (360 / bufferLength)) % 360;
    this.speed = 1 + amp * 5;
    this.lineWidth = 0.5 + amp * 2;
  }

  update() {
    this.radius += this.speed;
    this.life -= this.decay;
  }

  draw() {
    ctx.globalAlpha = Math.max(0, this.life * this.amp);
    ctx.beginPath();
    ctx.arc(this.cx, this.cy, this.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `hsl(${this.hue}, 85%, 60%)`;
    ctx.lineWidth = this.lineWidth;
    ctx.stroke();
  }
}

// --- Particles (small accent sparks) ---
const particles = [];

class Particle {
  constructor(energy) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * 20;
    this.x = W / 2 + Math.cos(angle) * r;
    this.y = H / 2 + Math.sin(angle) * r;
    const speed = 0.3 + energy * 2.5;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1;
    this.decay = 1 / (parseInt(lifespanEl.value) * (0.4 + Math.random() * 0.6));
    this.hue = (parseInt(hueEl.value) + Math.random() * 60 - 30 + 360) % 360;
    this.size = 0.5 + energy * 1.5;
  }

  update() {
    this.vx *= 0.97;
    this.vy *= 0.97;
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
  }

  draw() {
    ctx.globalAlpha = Math.max(0, this.life * 0.9);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${this.hue}, 90%, 70%)`;
    ctx.fill();
  }
}

const MAX_RINGS = 1500;

function loop() {
  requestAnimationFrame(loop);

  analyser.getByteFrequencyData(dataArray);

  const sensitivity = parseFloat(sensitivityEl.value) / 5;

  // Overall energy for fade control
  let sum = 0;
  for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
  const energy = Math.min(1, (sum / (bufferLength * 255)) * sensitivity * 2.5);

  // Fade background
  ctx.globalAlpha = 0.12 + energy * 0.08;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // Spawn one ring per frequency bin that's loud enough
  const threshold = Math.max(0.02, 0.15 / sensitivity);
  for (let i = 0; i < bufferLength && rings.length < MAX_RINGS; i++) {
    const amp = Math.min(1, (dataArray[i] / 255) * sensitivity);
    if (amp > threshold) {
      rings.push(new Ring(i, amp));
    }
  }

  // Spawn small particles based on total energy
  const maxP = parseInt(maxParticlesEl.value);
  const spawnCount = Math.floor(energy * 6 * sensitivity);
  for (let i = 0; i < spawnCount && particles.length < maxP; i++) {
    particles.push(new Particle(energy));
  }

  // Update and draw rings
  for (let i = rings.length - 1; i >= 0; i--) {
    rings[i].update();
    rings[i].draw();
    if (rings[i].life <= 0 || rings[i].radius > Math.hypot(W, H) / 2 + 10) {
      rings.splice(i, 1);
    }
  }

  // Update and draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  ctx.globalAlpha = 1;
}
</script>
</body>
</html>
