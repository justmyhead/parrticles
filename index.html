<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parrticles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: sans-serif; }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: 100vw;
      height: 100vh;
    }
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      z-index: 10;
    }
    #overlay h1 { font-size: 2.5rem; letter-spacing: 0.1em; }
    #overlay p { color: #aaa; font-size: 1rem; }
    #startBtn {
      margin-top: 8px;
      padding: 14px 36px;
      font-size: 1.1rem;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      border-radius: 40px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #startBtn:hover { background: #fff; color: #000; }
    #ui {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 5;
    }
    .ctrl { display: flex; flex-direction: column; gap: 4px; }
    label { color: #888; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    input[type=range] { width: 120px; accent-color: #fff; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="overlay">
  <h1>parrticles</h1>
  <p>Sound-reactive particle visualizer</p>
  <button id="startBtn">Allow Microphone</button>
</div>

<div id="ui" style="display:none">
  <div class="ctrl">
    <label>Sensitivity</label>
    <input type="range" id="sensitivity" min="1" max="10" value="5" step="0.1" />
  </div>
  <div class="ctrl">
    <label>Hue</label>
    <input type="range" id="hue" min="0" max="360" value="0" step="1" />
  </div>
  <div class="ctrl">
    <label>Particles</label>
    <input type="range" id="maxParticles" min="50" max="500" value="150" step="10" />
  </div>
  <div class="ctrl">
    <label>Lifespan</label>
    <input type="range" id="lifespan" min="30" max="300" value="120" step="10" />
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Low-res pixel grid for 8-bit look
const SCALE = 4;
let W, H;
function resize() {
  W = canvas.width  = Math.floor(window.innerWidth  / SCALE);
  H = canvas.height = Math.floor(window.innerHeight / SCALE);
}
resize();
window.addEventListener('resize', resize);

// 8-bit palette (NES-inspired)
const PALETTE = [
  '#f8f8f8', '#fcfc00', '#f83800', '#e45c10',
  '#00b800', '#00a844', '#0058f8', '#6844fc',
  '#d800cc', '#f878f8', '#00e8d8', '#00fcfc',
  '#787878', '#b8b8b8', '#3cbcfc', '#98f8b8',
];

function paletteColor(hueOffset, binFraction) {
  const idx = Math.floor(((hueOffset / 360) + binFraction) * PALETTE.length) % PALETTE.length;
  return PALETTE[(idx + PALETTE.length) % PALETTE.length];
}

let analyser, dataArray, bufferLength;

document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const audioCtx = new AudioContext();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 128; // 64 frequency bins
    bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
    source.connect(analyser);

    document.getElementById('overlay').style.display = 'none';
    document.getElementById('ui').style.display = 'flex';
    requestAnimationFrame(loop);
  } catch (e) {
    alert('Microphone access denied or unavailable.');
  }
});

const sensitivityEl  = document.getElementById('sensitivity');
const hueEl          = document.getElementById('hue');
const maxParticlesEl = document.getElementById('maxParticles');
const lifespanEl     = document.getElementById('lifespan');

// Draw a pixel-art square ring (hollow square)
function drawPixelRing(cx, cy, radius, color, thickness) {
  const px = Math.max(1, Math.round(thickness));
  ctx.fillStyle = color;
  const r = Math.round(radius);
  // Top & bottom bars
  ctx.fillRect(Math.round(cx - r), Math.round(cy - r), r * 2, px);
  ctx.fillRect(Math.round(cx - r), Math.round(cy + r - px), r * 2, px);
  // Left & right bars
  ctx.fillRect(Math.round(cx - r), Math.round(cy - r + px), px, r * 2 - px * 2);
  ctx.fillRect(Math.round(cx + r - px), Math.round(cy - r + px), px, r * 2 - px * 2);
}

// --- Rings ---
const rings = [];
const MAX_RINGS = 200;

class Ring {
  constructor(binIndex, amp) {
    this.cx = W / 2;
    this.cy = H / 2;
    this.radius = 2;
    this.amp = amp;
    this.life = 1;
    this.decay = (1 / parseInt(lifespanEl.value)) * (1.5 + (1 - amp));
    this.color = paletteColor(parseInt(hueEl.value), binIndex / bufferLength);
    this.speed = 0.5 + amp * 3;
    this.thickness = Math.max(1, Math.round(amp * 3));
    // Drift: rings wobble as they expand
    this.driftX = (Math.random() - 0.5) * 0.4;
    this.driftY = (Math.random() - 0.5) * 0.4;
    // Jitter phase for wobbly movement
    this.phase = Math.random() * Math.PI * 2;
    this.wobble = 0.3 + Math.random() * 0.5;
    this.tick = 0;
  }

  update() {
    this.radius += this.speed;
    this.cx += this.driftX + Math.sin(this.phase + this.tick * 0.15) * this.wobble;
    this.cy += this.driftY + Math.cos(this.phase + this.tick * 0.12) * this.wobble;
    this.tick++;
    this.life -= this.decay;
  }

  draw() {
    ctx.globalAlpha = Math.max(0, this.life * this.amp);
    drawPixelRing(this.cx, this.cy, this.radius, this.color, this.thickness);
  }
}

// --- Particles (pixel blocks) ---
const particles = [];

class Particle {
  constructor(energy) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * 5;
    this.x = W / 2 + Math.cos(angle) * r;
    this.y = H / 2 + Math.sin(angle) * r;
    const speed = 0.5 + energy * 4;
    this.vx = Math.cos(angle) * speed + (Math.random() - 0.5);
    this.vy = Math.sin(angle) * speed + (Math.random() - 0.5);
    this.gravity = 0.08;
    this.life = 1;
    this.decay = 1 / (parseInt(lifespanEl.value) * (0.4 + Math.random() * 0.6));
    this.color = paletteColor(parseInt(hueEl.value), Math.random());
    this.size = 1 + Math.floor(energy * 2); // 1–3px blocks
  }

  update() {
    this.vx *= 0.96;
    this.vy *= 0.96;
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    // Bounce off floor
    if (this.y > H - this.size) {
      this.y = H - this.size;
      this.vy *= -0.5;
      this.vx *= 0.85;
    }
    this.life -= this.decay;
  }

  draw() {
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;
    ctx.fillRect(Math.round(this.x), Math.round(this.y), this.size, this.size);
  }
}

let frameCount = 0;

function loop() {
  requestAnimationFrame(loop);
  frameCount++;

  analyser.getByteFrequencyData(dataArray);

  const sensitivity = parseFloat(sensitivityEl.value) / 5;

  let sum = 0;
  for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
  const energy = Math.min(1, (sum / (bufferLength * 255)) * sensitivity * 2.5);

  // Fade background — chunky pixel fade
  ctx.globalAlpha = 0.15 + energy * 0.1;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // Spawn rings every 4th bin, every other frame
  const threshold = Math.max(0.05, 0.2 / sensitivity);
  if (frameCount % 2 === 0) {
    for (let i = 0; i < bufferLength && rings.length < MAX_RINGS; i += 4) {
      const amp = Math.min(1, (dataArray[i] / 255) * sensitivity);
      if (amp > threshold) {
        rings.push(new Ring(i, amp));
      }
    }
  }

  // Spawn pixel particles
  const maxP = parseInt(maxParticlesEl.value);
  const spawnCount = Math.floor(energy * 4 * sensitivity);
  for (let i = 0; i < spawnCount && particles.length < maxP; i++) {
    particles.push(new Particle(energy));
  }

  // Update and draw rings
  for (let i = rings.length - 1; i >= 0; i--) {
    rings[i].update();
    rings[i].draw();
    if (rings[i].life <= 0 || rings[i].radius > Math.hypot(W, H) / 2 + 10) {
      rings.splice(i, 1);
    }
  }

  // Update and draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  ctx.globalAlpha = 1;
}
</script>
</body>
</html>
