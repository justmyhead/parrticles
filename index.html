<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parrticles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      z-index: 10;
    }
    #overlay h1 { font-size: 2.5rem; letter-spacing: 0.1em; }
    #overlay p { color: #aaa; font-size: 1rem; }
    #startBtn {
      margin-top: 8px;
      padding: 14px 36px;
      font-size: 1.1rem;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      border-radius: 40px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #startBtn:hover { background: #fff; color: #000; }
    #ui {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 5;
    }
    .ctrl { display: flex; flex-direction: column; gap: 4px; }
    label { color: #888; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    input[type=range] { width: 120px; accent-color: #fff; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="overlay">
  <h1>parrticles</h1>
  <p>Sound-reactive particle visualizer</p>
  <button id="startBtn">Allow Microphone</button>
</div>

<div id="ui" style="display:none">
  <div class="ctrl">
    <label>Sensitivity</label>
    <input type="range" id="sensitivity" min="1" max="10" value="5" step="0.1" />
  </div>
  <div class="ctrl">
    <label>Particles</label>
    <input type="range" id="maxParticles" min="100" max="2000" value="600" step="50" />
  </div>
  <div class="ctrl">
    <label>Lifespan</label>
    <input type="range" id="lifespan" min="30" max="300" value="120" step="10" />
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Audio
let analyser, dataArray, bufferLength;

document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const audioCtx = new AudioContext();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
    source.connect(analyser);

    document.getElementById('overlay').style.display = 'none';
    document.getElementById('ui').style.display = 'flex';
    requestAnimationFrame(loop);
  } catch (e) {
    alert('Microphone access denied or unavailable.');
  }
});

// Controls
const sensitivityEl = document.getElementById('sensitivity');
const maxParticlesEl = document.getElementById('maxParticles');
const lifespanEl = document.getElementById('lifespan');

// Particles
const particles = [];

class Particle {
  constructor(x, y, bass, mid, treble) {
    this.x = x;
    this.y = y;
    const speed = 1 + bass * 8;
    const angle = Math.random() * Math.PI * 2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1;
    this.decay = 1 / (parseInt(lifespanEl.value) * (0.6 + Math.random() * 0.8));

    // Color based on frequency bands
    const hue = (bass * 60 + mid * 180 + treble * 300) % 360;
    const sat = 60 + treble * 40;
    const lit = 45 + bass * 30;
    this.color = `hsl(${hue},${sat}%,${lit}%)`;

    this.size = 2 + bass * 6 + treble * 4;
    this.gravity = 0.05 + bass * 0.1;
  }

  update() {
    this.vx *= 0.97;
    this.vy = this.vy * 0.97 + this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
  }

  draw() {
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
}

function getFreqBands() {
  analyser.getByteFrequencyData(dataArray);
  const third = Math.floor(bufferLength / 3);
  let bass = 0, mid = 0, treble = 0;
  for (let i = 0; i < third; i++) bass += dataArray[i];
  for (let i = third; i < third * 2; i++) mid += dataArray[i];
  for (let i = third * 2; i < bufferLength; i++) treble += dataArray[i];
  const scale = (parseFloat(sensitivityEl.value) / 5) / (255 * third);
  return {
    bass: Math.min(1, bass * scale),
    mid: Math.min(1, mid * scale),
    treble: Math.min(1, treble * scale),
  };
}

let hueShift = 0;

function loop() {
  requestAnimationFrame(loop);

  const { bass, mid, treble } = getFreqBands();
  const energy = (bass + mid + treble) / 3;

  // Fade trail
  ctx.globalAlpha = 0.18 + bass * 0.1;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  hueShift = (hueShift + 0.5 + energy * 2) % 360;

  // Spawn particles on beats / energy
  const maxP = parseInt(maxParticlesEl.value);
  const spawnCount = Math.floor(energy * 12 * (parseFloat(sensitivityEl.value) / 5));
  for (let i = 0; i < spawnCount && particles.length < maxP; i++) {
    const cx = W / 2 + (Math.random() - 0.5) * W * 0.3 * bass;
    const cy = H / 2 + (Math.random() - 0.5) * H * 0.3 * mid;
    particles.push(new Particle(cx, cy, bass, mid, treble));
  }

  // Update & draw
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  // Central glow on bass
  if (bass > 0.2) {
    const r = bass * Math.min(W, H) * 0.3;
    const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, r);
    const hue = (hueShift + 30) % 360;
    grad.addColorStop(0, `hsla(${hue},100%,70%,${bass * 0.25})`);
    grad.addColorStop(1, 'transparent');
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(W/2, H/2, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }
}
</script>
</body>
</html>
